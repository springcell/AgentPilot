<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>ZeroChatgpt 工具调用示例</title>
  <style>
    body { font-family: system-ui; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
    input, button { padding: 0.5rem 1rem; margin: 0.25rem 0; }
    input { width: 100%; box-sizing: border-box; }
    button { background: #0a7; color: white; border: none; cursor: pointer; }
    pre { background: #f4f4f4; padding: 1rem; overflow: auto; font-size: 0.9em; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>ZeroChatgpt 工具调用</h1>
  <p>需先启动 API：<code>npm run api</code>，默认端口 3000。</p>
  <p>
    <label>API 地址：</label>
    <input type="text" id="apiUrl" value="http://127.0.0.1:3000" placeholder="http://127.0.0.1:3000">
  </p>
  <p>
    <label>工具：</label>
    <select id="tool">
      <option value="run_command">run_command</option>
      <option value="list_dir">list_dir</option>
      <option value="read_file">read_file</option>
    </select>
  </p>
  <p>
    <label>参数（JSON）：</label>
    <input type="text" id="args" value='{"command":"echo hello"}' placeholder='{"command":"dir"}'>
  </p>
  <p><button id="btn">调用</button></p>
  <pre id="result">点击「调用」查看结果</pre>

  <script>
    const apiUrl = document.getElementById('apiUrl');
    const tool = document.getElementById('tool');
    const args = document.getElementById('args');
    const btn = document.getElementById('btn');
    const result = document.getElementById('result');

    function updateArgsPlaceholder() {
      const t = tool.value;
      if (t === 'run_command') args.placeholder = '{"command":"dir"}';
      else if (t === 'list_dir') args.placeholder = '{"path":"."}';
      else if (t === 'read_file') args.placeholder = '{"path":"config.json"}';
    }
    tool.addEventListener('change', updateArgsPlaceholder);

    btn.addEventListener('click', async () => {
      result.textContent = '请求中...';
      try {
        let a;
        try { a = JSON.parse(args.value || '{}'); } catch { a = {}; }
        const base = apiUrl.value.replace(/\/$/, '');
        const res = await fetch(base + '/tools/invoke', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tool: tool.value, args: a }),
        });
        const data = await res.json();
        result.textContent = JSON.stringify(data, null, 2);
        result.classList.remove('error');
      } catch (e) {
        result.textContent = '错误: ' + e.message + '\n\n可能原因：API 未启动或跨域（用 ngrok 暴露后访问）';
        result.classList.add('error');
      }
    });
  </script>
</body>
</html>
